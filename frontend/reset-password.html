<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reset Password - NetChill</title>
    <link rel="stylesheet" href="./src/output.css">
    <style>
        body { background: #0f172a; color: #e6eef8; font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background:rgba(15,23,42,0.85); padding:24px; border-radius:8px; width:100%; max-width:420px; box-shadow:0 10px 30px rgba(2,6,23,0.6); }
        .input { width:100%; padding:10px 12px; border-radius:6px; background:#0b1220; border:1px solid rgba(148,163,184,0.06); color:#e6eef8; }
        .btn { width:100%; padding:12px; background:linear-gradient(90deg,#06b6d4,#0ea5e9); color:#042331; border:none; border-radius:6px; font-weight:700; }
        .muted { color:#94a3b8; font-size:14px; }
        .alert { padding:10px; border-radius:6px; margin-top:12px; }
        .alert.success { background:rgba(16,185,129,0.08); color:#6ee7b7; border:1px solid rgba(16,185,129,0.12); }
        .alert.error { background:rgba(239,68,68,0.06); color:#fecaca; border:1px solid rgba(239,68,68,0.08); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset your password</h2>
        <p class="muted">Enter a new password. The reset link you clicked should include a temporary access token.</p>

        <div id="noToken" class="alert error hidden" style="display:none;">No reset token found. Use the link in the email we sent you.</div>

        <div id="formArea">
            <div style="margin-top:12px">
                <label class="muted">New password</label>
                <input id="password" type="password" class="input" placeholder="New password">
            </div>
            <div style="margin-top:12px">
                <label class="muted">Confirm password</label>
                <input id="confirmPassword" type="password" class="input" placeholder="Confirm password">
            </div>

            <button id="submitBtn" class="btn" style="margin-top:16px">Set new password</button>

            <div id="error" class="alert error" style="display:none"></div>
            <div id="success" class="alert success" style="display:none"></div>
        </div>

        <p class="muted" style="margin-top:14px">Return to <a href="./login.html">Sign in</a></p>
    </div>

<script type="module">
    import { getResetTokenFromLocation } from './src/resetPasswordDeepLink.mjs';

    const token = getResetTokenFromLocation(window.location);
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const noTokenEl = document.getElementById('noToken');
    const formArea = document.getElementById('formArea');

    if (!token) {
        noTokenEl.style.display = 'block';
        formArea.style.display = 'none';
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        const pw = document.getElementById('password').value || '';
        const pw2 = document.getElementById('confirmPassword').value || '';

        if (pw.length < 8) {
            errorEl.textContent = 'Password must be at least 8 characters.';
            errorEl.style.display = 'block';
            return;
        }
        if (pw !== pw2) {
            errorEl.textContent = 'Passwords do not match.';
            errorEl.style.display = 'block';
            return;
        }

        try {
            const resp = await fetch('/api/auth/reset-complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_token: token, password: pw }),
                credentials: 'include'
            });
            const data = await resp.json().catch(() => ({}));

            if (!resp.ok) {
                errorEl.textContent = data?.message || 'Failed to set password.';
                errorEl.style.display = 'block';
                return;
            }

            successEl.textContent = '✓ Password updated. Redirecting to sign in...';
            successEl.style.display = 'block';
            setTimeout(() => window.location.replace('./login.html'), 1800);
        } catch (err) {
            console.error(err);
            errorEl.textContent = 'Network error. Please try again.';
            errorEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
