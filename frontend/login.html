<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register - NetChill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/output.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: white; padding-bottom: 8px; font-weight: bold; }
        .tab-inactive { color: #9ca3af; padding-bottom: 8px; font-weight: bold; }
        .tab-inactive:hover { color: #e5e7eb; }
    </style>
</head>
<body class="bg-[#0f172a] font-sans selection:bg-blue-500 selection:text-white">

    <div class="relative min-h-screen w-full flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1574267432553-4b4628081c31?auto=format&fit=crop&q=80')] bg-cover bg-center">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"></div>

        <div class="relative z-10 w-full max-w-md p-6">
            <div class="text-center mb-8">
                <h1 class="text-5xl font-black text-white italic tracking-tighter drop-shadow-lg">
                    NET<span class="text-blue-500">CHILL</span>
                </h1>
                <p class="text-gray-300 mt-2 font-medium">Your streaming entertainment hub</p>
                <p class="text-blue-300 mt-2 text-sm font-semibold">New users get 14 days free access.</p>
            </div>

            <!-- Tab Navigation -->
            <div class="flex gap-4 mb-6 border-b border-white/20">
                <button id="loginTab" onclick="switchTab('login')" class="tab-inactive">LOGIN</button>
                <button id="signupTab" onclick="switchTab('signup')" class="tab-active">SIGN UP</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="hidden bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl space-y-5">
                <h2 class="text-2xl font-bold text-white text-center mb-6">Welcome Back</h2>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Email</label>
                    <input type="email" id="loginEmail" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="your@email.com">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Password</label>
                    <input type="password" id="loginPassword" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-extrabold rounded-xl shadow-lg transition-all active:scale-[0.98]">LOGIN</button>
                <div id="loginError" class="hidden text-red-400 text-sm text-center"></div>
                <div id="loginSuccess" class="hidden text-green-400 text-sm text-center"></div>
            </form>

            <!-- SIGNUP FORM (Hidden by default) -->
            <form id="signupForm" class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl shadow-2xl space-y-5">
                <h2 class="text-2xl font-bold text-white text-center mb-6">Create Account</h2>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Full Name</label>
                    <input type="text" id="signupName" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Your Name">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Email</label>
                    <input type="email" id="signupEmail" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="your@email.com">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Password</label>
                    <input type="password" id="signupPassword" required class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-300 uppercase ml-1">Package Plan</label>
                    <select id="signupPackage" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                        <option class="bg-slate-900" value="Free">Start 14-Day Free Trial</option>
                    </select>
                </div>
                <button type="submit" id="signupBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-extrabold rounded-xl shadow-lg transition-all active:scale-[0.98]">SIGN UP NOW</button>
                <div id="signupError" class="hidden text-red-400 text-sm text-center"></div>
                <div id="signupSuccess" class="hidden text-green-400 text-sm text-center"></div>
            </form>
        </div>
    </div>

    <!-- API Config and Logic -->
    <script>
        window.__API_BASE_URL__ = "https://your-backend.onrender.com/api/data"; // Replace with your actual Render URL
    </script>
    <script src="./api.js"></script>

    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.className = 'tab-active';
                signupTab.className = 'tab-inactive';
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                loginTab.className = 'tab-inactive';
                signupTab.className = 'tab-active';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('netchill_user') || localStorage.getItem('user');
            if (!storedUser) {
                switchTab('signup');
            }
        });

        // Improved Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            const successEl = document.getElementById('loginSuccess');
            
            btn.disabled = true;
            btn.innerText = "WAITING FOR SERVER..."; // Helpful for Render users
            errorEl.classList.add('hidden');

            try {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                const response = await authAPI.login(email, password);
                
                // Logic to handle different response structures
                const userPayload = response.user || response.data || response;

                localStorage.setItem('netchill_user', JSON.stringify({
                    id: userPayload.id || userPayload._id,
                    email: email,
                    fullName: userPayload.fullName || userPayload.name || 'User',
                    subscription: userPayload.subscription || 'Free'
                }));

                successEl.textContent = "Success! Opening NetChill...";
                successEl.classList.remove('hidden');

                setTimeout(() => {
                    window.location.replace('./index.html');
                }, 1000);

            } catch (error) {
                btn.disabled = false;
                btn.innerText = "LOGIN";
                errorEl.textContent = error.message || "Invalid credentials or server error.";
                errorEl.classList.remove('hidden');
            }
        });

        // Signup form handler remains similar but with the window.location.replace fix
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerText = "CREATING ACCOUNT...";

            try {
                const fullName = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const subscription = document.getElementById('signupPackage').value;

                await authAPI.signup(fullName, email, password, subscription);
                
                // Store the signed-up user locally and open the main page.
                localStorage.setItem('netchill_user', JSON.stringify({ email, fullName, subscription }));
                document.getElementById('signupSuccess').textContent = 'Account created successfully. Opening NetChill...';
                document.getElementById('signupSuccess').classList.remove('hidden');

                setTimeout(() => {
                    window.location.replace('./index.html');
                }, 1000);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "SIGN UP NOW";
                document.getElementById('signupError').textContent = error.message;
                document.getElementById('signupError').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
