<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #020617;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        text-align: center;
        padding: 32px;
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.95);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
      }
      h1 { font-size: 3rem; margin: 0 0 12px; }
      p { line-height: 1.6; margin-bottom: 16px; }
      a {
        display: inline-block;
        padding: 10px 16px;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404</h1>
      <p>The page you requested could not be found. It may have moved or the URL may be incorrect.</p>
      <a href="/">Go back home</a>
    </div>
  </body>
</html>
